# Netlify — Expo Router static web export
# Site: https://glucosewars.netlify.app/

[build]
  # npm ci uses package-lock.json (pnpm-lock.yaml removed on purpose)
  command = "npx expo export --platform web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Skip git hooks in CI
  HUSKY = "0"
  # Force npm (do not use pnpm) — package-lock.json is source of truth
  NPM_FLAGS = ""

# Client-side routes for invite / digest / challenge deep links
[[redirects]]
  from = "/invite/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/digest/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/challenge/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Required EXPO_PUBLIC_* build env (set in Netlify UI → Site settings → Environment variables):
#   EXPO_PUBLIC_APP_URL=https://glucosewars.netlify.app
#   EXPO_PUBLIC_LEADERBOARD_WORKER_URL=https://glucosewars-leaderboard.papaandthejimjams.workers.dev
#   EXPO_PUBLIC_LEADERBOARD_API_URL=https://glucosewars-leaderboard.papaandthejimjams.workers.dev
