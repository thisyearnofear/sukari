name = "glucosewars-leaderboard"
main = "src/index.ts"
compatibility_date = "2026-04-18"

# Durable Object for per-challenge leaderboards
durable_objects.bindings = [
  { name = "LEADERBOARD", class_name = "LeaderboardDO" }
]

migrations = [
  # SQLite-backed DO required on Workers Free plan
  { tag = "v1", new_sqlite_classes = ["LeaderboardDO"] }
]

[[kv_namespaces]]
binding = "DIGEST"
id = "272db1c3055a45998b183df6cb2b0077"

[vars]
# Comma-separated list of allowed origins for CORS (set to your deployed web origin).
ALLOWED_ORIGINS = "*"
RUNWARE_MODEL = "deepseek:v4@flash"
# Optional mission-image model used only by POST /media/mission-image.
RUNWARE_IMAGE_MODEL = "runware:101@1"
OPENAI_MODEL = "gpt-4o-mini"
# Secrets:
#   npx wrangler secret put RUNWARE_API_KEY   # primary LLM
#   npx wrangler secret put OPENAI_API_KEY    # fallback LLM
